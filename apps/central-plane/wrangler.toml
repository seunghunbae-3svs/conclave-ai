name = "conclave-ai"
main = "src/index.ts"
compatibility_date = "2026-04-20"
compatibility_flags = ["nodejs_compat"]

# D1 binding. `database_id` must be replaced with the id returned by
# `wrangler d1 create conclave-ai` on first setup.
[[d1_databases]]
binding = "DB"
database_name = "conclave-ai"
database_id = "28be7ec4-9c46-4b78-8d07-11f344021dd0"

[vars]
ENVIRONMENT = "production"
# Public GitHub OAuth App client_id. Register at https://github.com/settings/developers
# (type: OAuth App, enable device flow). Leave the placeholder if OAuth is not
# yet configured — /oauth/device/* endpoints will return 503 until this is real.
GITHUB_CLIENT_ID = "Ov23ctqhuNRdhunT36Y9"

# Observability. Logs retained 3 days on free tier, sufficient for v0.4-alpha.
[observability]
enabled = true
