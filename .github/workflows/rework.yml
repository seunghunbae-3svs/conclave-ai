# Conclave AI — reusable rework (autofix) workflow (v0.10)
#
# Closes the autonomous rework loop on the consumer side. Fired by the
# central plane (apps/central-plane) via `repository_dispatch` of type
# `conclave-rework` whenever a review verdict comes back as "rework"
# AND cycle < max. The dispatch carries `pr_number`, `cycle`,
# `max_cycles`, and `episodic` in its client_payload. This workflow:
#
#   1. Checks out the PR branch (the head ref of pr_number).
#   2. Installs @conclave-ai/cli (same pinned version as review.yml).
#   3. Runs `conclave autofix --pr N --rework-cycle <cycle>
#      --max-iterations 1 --autonomy l2`. Autofix (since v0.7) commits
#      and pushes by itself; v0.10 embeds the cycle marker in the
#      commit message so the next push re-triggers review.yml and the
#      review workflow's cycle extractor picks up the bumped cycle.
#   4. Posts a one-line summary on the PR so humans tracking the loop
#      see what just happened (which blockers were fixed, cost, build
#      status).
#
# The push that autofix produces re-triggers `review.yml` via the
# `pull_request: synchronize` event in the consumer-side wrapper
# workflow `conclave-rework.yml` written by `conclave init`. Review
# runs again, central-plane sees the new verdict, and either approves
# (loop ends) or fires a fresh `conclave-rework` dispatch (next cycle).
#
# Trust model:
#   `repository_dispatch` is sent by the install's stored OAuth token,
#   which only the central plane holds. A dispatch arriving here means
#   it came from our infrastructure on behalf of an authenticated
#   install. We still gate on `cycle < max_cycles` so a malformed
#   dispatch can't loop forever.
#
# Secrets the caller MUST provide (or inherit):
#   ANTHROPIC_API_KEY  required (autofix calls Claude as the worker).
#   CONCLAVE_TOKEN     optional but recommended — keeps the post-autofix
#                      review running on the central-plane path.
#   GITHUB_TOKEN       provided automatically; needs `contents: write`
#                      so autofix can push the fix commit.

name: Conclave AI Rework (reusable)

on:
  workflow_call:
    inputs:
      pr-number:
        description: 'Pull-request number from the dispatch client_payload.'
        required: true
        type: string
      cycle:
        description: 'Current rework cycle (0-based). Autofix bumps this by one in the commit marker.'
        required: false
        type: string
        default: "0"
      max-cycles:
        description: 'Hard ceiling for rework cycles. Workflow refuses to run when cycle >= max-cycles.'
        required: false
        type: string
        default: "3"
      cli-version:
        description: 'npm version tag for @conclave-ai/cli. Keep in lockstep with review.yml default.'
        required: false
        type: string
        default: 0.14.8
      episodic:
        description: 'v0.13.4 — episodic id from the dispatch client_payload. When set, the workflow fetches the full episodic from /episodic/anchor and passes it to autofix as --verdict, so autofix does NOT have to re-spawn its own review (saves ~$0.40 per cycle).'
        required: false
        type: string
        default: ""
        # NOTE: when this default changes, also update the matching default
        # in .github/workflows/review.yml so the two halves of the loop
        # never split-version. The release workflow advances both at once.
      build-cmd:
        description: 'Optional explicit build command for autofix verification (default: auto-detect).'
        required: false
        type: string
        default: ""
      test-cmd:
        description: 'Optional explicit test command for autofix verification (default: auto-detect).'
        required: false
        type: string
        default: ""

jobs:
  rework:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # autofix pushes the fix commit
      pull-requests: write  # autofix posts a bailout comment if needed
    concurrency:
      group: conclave-rework-${{ inputs.pr-number }}
      cancel-in-progress: true
    timeout-minutes: 15
    steps:
      - name: Cycle ceiling guard
        id: guard
        run: |
          set -euo pipefail
          CYCLE=${{ inputs.cycle }}
          MAX=${{ inputs.max-cycles }}
          # Hard upper bound: refuse to run when cycle has already reached
          # max. The central plane normally won't fire a dispatch in that
          # state, but defense-in-depth is cheap.
          if [ "$CYCLE" -ge "$MAX" ]; then
            echo "::warning::Rework cycle $CYCLE has reached max $MAX — skipping autofix."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve PR head ref
        if: steps.guard.outputs.skip != 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Look up the PR head ref so we can check it out. We can't use
          # `actions/checkout`'s default-branch fallback because we MUST
          # land the autofix commit on the PR branch, not main.
          # v0.13.2 — explicit --repo so gh CLI doesn't try to infer it
          # from `git config remote.origin.url` of the surrounding cwd.
          # The step runs BEFORE actions/checkout (we need the head ref
          # to know what to check out), so without --repo we fail with
          # `fatal: not a git repository`. Live-caught on
          # seunghunbae-3svs/eventbadge#25 dispatch run 24954226458.
          REF=$(gh pr view "${{ inputs.pr-number }}" --repo "${{ github.repository }}" --json headRefName --jq .headRefName)
          if [ -z "$REF" ]; then
            echo "::error::Could not resolve PR #${{ inputs.pr-number }} head ref"
            exit 1
          fi
          echo "head_ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0
          # v0.13.4 — prefer ORCHESTRATOR_PAT (or AUTOFIX_PUSH_TOKEN if
          # provided) for the checkout token. Pushes made with the
          # default GITHUB_TOKEN do NOT trigger downstream workflows
          # (GitHub Actions security policy: a workflow run can't
          # cascade into another workflow run via GITHUB_TOKEN to
          # prevent infinite loops). That broke the autonomy loop:
          # autofix pushed cleanly, but pull_request:synchronize
          # never fired, so review.yml didn't re-run, and the cycle
          # stalled at 1/3 forever.
          # Live-caught on eventbadge#25 commit 22a0b99.
          # Fallback: GITHUB_TOKEN. The autofix commit lands either
          # way; only the auto-re-review hinges on the PAT.
          token: ${{ secrets.AUTOFIX_PUSH_TOKEN || secrets.ORCHESTRATOR_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        if: steps.guard.outputs.skip != 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install @conclave-ai/cli
        if: steps.guard.outputs.skip != 'true'
        run: pnpm add -g "@conclave-ai/cli@${{ inputs.cli-version }}"

      # v0.13.4 — install consumer repo's deps so autofix's build/test
      # verify step can actually run. Without this, `pnpm run build`
      # fails with missing-binary errors because node_modules doesn't
      # exist, autofix logs "build failed — reverting", and the loop
      # never produces a commit. Live-caught on eventbadge#25 rework
      # run 24957219839 (cli@0.13.3, anchor verdict path verified
      # working but the eventbadge build itself can't start).
      #
      # Auto-detect the package manager from the lockfile so we don't
      # force pnpm on yarn/npm consumer repos. Soft-fail (|| true) on
      # the install — autofix is best-effort, and a missing lockfile
      # is rare enough that the bail message ("build failed") points
      # operators at the real issue (no install step ran) instead of
      # crashing the whole workflow.
      - name: Install consumer-repo dependencies (for autofix verify)
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          # v0.13.4 — install dependencies in every directory that has a
          # package.json (excluding node_modules and any vendored copies).
          # Handles three common layouts:
          #   1. monolithic: root package.json + lockfile
          #   2. monorepo (pnpm workspace): root pnpm-workspace.yaml; one
          #      `pnpm install -r` covers everything
          #   3. split (e.g. eventbadge): root package.json with a
          #      `cd frontend && build` script + frontend/ subdir with its
          #      own package.json + lockfile. Neither `-r` nor a single
          #      root install covers the nested deps; we walk and install.
          # The ordering is deliberate:
          #   - pnpm workspace: cheapest single command, do it first
          #   - else: walk each package.json and install in its dir
          install_dir() {
            local dir="$1"
            cd "$dir"
            if [ -f pnpm-lock.yaml ]; then
              pnpm install --frozen-lockfile 2>&1 || pnpm install 2>&1 || true
            elif [ -f yarn.lock ]; then
              corepack enable 2>&1 || true
              yarn install --frozen-lockfile 2>&1 || yarn install 2>&1 || true
            elif [ -f package-lock.json ]; then
              npm ci 2>&1 || npm install 2>&1 || true
            elif [ -f package.json ]; then
              npm install 2>&1 || true
            fi
            cd - > /dev/null
          }
          if [ -f pnpm-workspace.yaml ]; then
            echo "Detected pnpm workspace — recursive install"
            pnpm install -r --frozen-lockfile || pnpm install -r || true
          elif [ -f package.json ]; then
            echo "Installing root deps"
            install_dir "."
            # Walk for nested package.json (skip node_modules + vendored).
            while IFS= read -r nested; do
              ndir=$(dirname "$nested")
              if [ "$ndir" != "." ]; then
                echo "Installing nested deps: $ndir"
                install_dir "$ndir"
              fi
            done < <(find . -name package.json -not -path "*/node_modules/*" -not -path "./node_modules/*" 2>/dev/null | head -10)
          else
            echo "::warning::No package.json at repo root — skipping dependency install (autofix verify may fail)"
          fi

      - name: Configure git author for autofix commit
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "conclave-autofix[bot]"
          git config user.email "noreply@conclave.ai"

      # v0.13.4 — fetch the verdict from the central plane's episodic
      # anchor (stored at /episodic/anchor by `conclave review` since
      # v0.13). Without this step autofix would spawn its own
      # `conclave review --pr N --json` to fetch the verdict, which:
      #   1. doubles cost ($0.40 per cycle for the extra council run)
      #   2. produces a duplicate verdict notification (mitigated by
      #      v0.13.2's --no-notify, but the cost was the real issue)
      #   3. introduces a ~30s race window where the file content the
      #      worker patches against could differ from the file content
      #      reviewed
      # By passing --verdict, autofix skips the spawn entirely.
      - name: Fetch verdict from episodic anchor
        if: steps.guard.outputs.skip != 'true' && inputs.episodic != ''
        id: verdict
        env:
          CONCLAVE_TOKEN: ${{ secrets.CONCLAVE_TOKEN }}
          CONCLAVE_CENTRAL_URL: ${{ vars.CONCLAVE_CENTRAL_URL || '' }}
          EPISODIC: ${{ inputs.episodic }}
        run: |
          set -euo pipefail
          BASE="${CONCLAVE_CENTRAL_URL:-https://conclave-ai.seunghunbae.workers.dev}"
          BASE="${BASE%/}"
          if [ -z "${CONCLAVE_TOKEN:-}" ]; then
            echo "::warning::CONCLAVE_TOKEN unset — cannot fetch verdict from anchor; autofix will fall back to spawning its own review"
            echo "have_verdict=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Pull the anchor record. The route returns
          #   { ok: true, payload: { ...EpisodicEntry } }
          # Extract `payload` directly so autofix's --verdict consumes the
          # episodic-entry shape (parseVerdictFile accepts both the
          # episodic shape and the v0.7.1 --json shape).
          if curl -fsSL \
            -H "authorization: Bearer ${CONCLAVE_TOKEN}" \
            "${BASE}/episodic/anchor/${EPISODIC}" \
            -o /tmp/anchor-response.json; then
            jq -e '.payload' /tmp/anchor-response.json > /tmp/verdict.json
            echo "have_verdict=true" >> "$GITHUB_OUTPUT"
            echo "Fetched verdict from anchor (${EPISODIC}): $(wc -c < /tmp/verdict.json) bytes"
          else
            echo "::warning::Could not fetch /episodic/anchor/${EPISODIC} — autofix will fall back to spawning its own review"
            echo "have_verdict=false" >> "$GITHUB_OUTPUT"
          fi

      # v0.13.6 — pre-autofix worktree diagnostic. Live-needed because
      # eventbadge#28 showed the file content at apply time was the
      # BASE branch's version (no console.log) even though the PR
      # branch's HEAD commit definitely had it. Prints git status +
      # heads of files in the diff so we can pinpoint where the file
      # state diverges from what the worker saw.
      - name: DEBUG — pre-autofix worktree state
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          echo "::group::git status"
          git status --short || true
          echo "::endgroup::"
          echo "::group::HEAD sha"
          git rev-parse HEAD || true
          echo "::endgroup::"
          BASE_REF="${GITHUB_BASE_REF:-main}"
          git fetch --no-tags --depth=50 origin "$BASE_REF" 2>/dev/null || true
          echo "::group::files changed vs $BASE_REF"
          git diff --name-only "origin/${BASE_REF}...HEAD" || true
          echo "::endgroup::"
          for f in $(git diff --name-only "origin/${BASE_REF}...HEAD" 2>/dev/null | head -3); do
            if [ -f "$f" ]; then
              echo "::group::head 8 lines of $f"
              head -8 "$f" || true
              echo "::endgroup::"
            fi
          done

      - name: Run autofix (single-iteration; CI re-triggers next cycle)
        if: steps.guard.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CONCLAVE_TOKEN: ${{ secrets.CONCLAVE_TOKEN }}
          CONCLAVE_CENTRAL_URL: ${{ vars.CONCLAVE_CENTRAL_URL || '' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tell autofix it's running inside the autonomy loop so the
          # commit it produces gets the cycle marker even when --rework-cycle
          # is 0 (defensive: a dispatch with cycle=0 is still a loop run).
          CONCLAVE_AUTONOMY_LOOP: "1"
        run: |
          set -euo pipefail
          EXTRA=""
          if [ -n "${{ inputs.build-cmd }}" ]; then
            EXTRA="$EXTRA --build-cmd '${{ inputs.build-cmd }}'"
          fi
          if [ -n "${{ inputs.test-cmd }}" ]; then
            EXTRA="$EXTRA --test-cmd '${{ inputs.test-cmd }}'"
          fi
          # v0.13.4 — pass the anchor-fetched verdict file when available,
          # so autofix does not spawn its own review. Fallback: when the
          # fetch failed (network blip / anchor missing for legacy review
          # runs from before v0.13), autofix's auto-spawn path takes over.
          if [ "${{ steps.verdict.outputs.have_verdict }}" = "true" ]; then
            EXTRA="$EXTRA --verdict /tmp/verdict.json"
          fi
          # max-iterations=3 — autofix runs UP TO 3 internal iterations
          # within ONE cycle dispatch. Each iteration re-prompts the
          # worker with the prior iteration's build/test failure tail
          # (autofix.ts feeds previousBuildErrorTail into the next
          # WorkerContext.summary), so iter 2 sees "iter 1's patch
          # broke the build with TS2345" and tries a different fix.
          #
          # Pre-this rework.yml passed --max-iterations 1, so a single
          # build-fail bailed the cycle immediately. With no push, no
          # cycle 2 ever fired. Bae on PR #46: "배포실패면 그걸 2/3
          # 사이클에서 작업을 했어야하고" — the loop was supposed to
          # KEEP TRYING. Bumping internal iters to 3 gives autofix a
          # chance to recover from build-fail without needing a new
          # cycle dispatch (which couldn't fire anyway with no push).
          # autonomy=l2 — never auto-merge from the rework loop; final
          # approve still requires Bae's button.
          # shellcheck disable=SC2086
          conclave autofix \
            --pr "${{ inputs.pr-number }}" \
            --rework-cycle "${{ inputs.cycle }}" \
            --max-iterations 3 \
            --autonomy l2 \
            $EXTRA
        id: autofix-step
        continue-on-error: true

      # AF-2 follow-on — if the autofix step ran (skip != true) and exited
      # non-zero AND we didn't push (no commit means no automatic re-trigger),
      # dispatch the NEXT cycle directly so the autonomy loop keeps trying.
      # With no push, the only way for cycle N+1 to fire is via a fresh
      # repository_dispatch — which we fire here from the workflow itself.
      # Gated by `cycle + 1 < max-cycles` so we don't loop past the ceiling.
      # Best-effort: dispatch failure logs ::warning:: but doesn't fail
      # the workflow.
      - name: Dispatch next cycle on autofix failure (no push)
        if: steps.guard.outputs.skip != 'true' && steps.autofix-step.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.ORCHESTRATOR_PAT || secrets.GITHUB_TOKEN }}
          CYCLE: ${{ inputs.cycle }}
          MAX: ${{ inputs.max-cycles }}
          PR: ${{ inputs.pr-number }}
          EPISODIC: ${{ inputs.episodic }}
        run: |
          set -euo pipefail
          NEXT=$(( CYCLE + 1 ))
          if [ "$NEXT" -ge "$MAX" ]; then
            echo "::notice::Autofix failed at cycle $CYCLE; next cycle ($NEXT) would hit the ceiling — letting cycle ceiling skip emit review-finished"
            exit 0
          fi
          echo "::notice::Autofix failed at cycle $CYCLE; dispatching cycle $NEXT (max $MAX) so the loop keeps trying"
          # Dispatch via repository_dispatch on the consumer's repo. The
          # consumer's wrapper workflow (conclave-rework.yml) listens for
          # event_type=conclave-rework and re-invokes this reusable.
          jq -n \
            --argjson pr "$PR" \
            --argjson cycle "$NEXT" \
            --argjson max "$MAX" \
            --arg ep "$EPISODIC" \
            '{event_type: "conclave-rework", client_payload: {pr_number: $pr, cycle: $cycle, max_cycles: $max, episodic: $ep}}' \
            | gh api "repos/${{ github.repository }}/dispatches" \
                -X POST \
                --input - || \
            echo "::warning::failed to dispatch next cycle (autofix already bailed; user will see review-finished bail card on Telegram)"
          # Re-fail the workflow so the GitHub Actions UI shows red on
          # bail. The dispatch above is the loop continuation; the
          # workflow's own status reflects THIS cycle's outcome.
          exit 1

      - name: Skipped notice
        if: steps.guard.outputs.skip == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ inputs.pr-number }}" --body "Conclave rework loop hit the cycle ceiling (${{ inputs.cycle }}/${{ inputs.max-cycles }}). Human review needed — see open blockers above." || true

      # UX-4 follow-on — when the cycle-ceiling guard skips autofix, the
      # autonomy loop is genuinely done. Emit review-finished to the
      # central plane so the user gets the unified terminal report
      # card on Telegram. Pre-this, ceiling-skip ended in silence on
      # Telegram (only a PR comment).
      - name: Emit review-finished (cycle ceiling)
        if: steps.guard.outputs.skip == 'true' && inputs.episodic != ''
        env:
          CONCLAVE_TOKEN: ${{ secrets.CONCLAVE_TOKEN }}
          CONCLAVE_CENTRAL_URL: ${{ vars.CONCLAVE_CENTRAL_URL || '' }}
          EPISODIC: ${{ inputs.episodic }}
          CYCLE: ${{ inputs.cycle }}
          MAX_CYCLES: ${{ inputs.max-cycles }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr-number }}
        run: |
          set -euo pipefail
          BASE="${CONCLAVE_CENTRAL_URL:-https://conclave-ai.seunghunbae.workers.dev}"
          BASE="${BASE%/}"
          if [ -z "${CONCLAVE_TOKEN:-}" ]; then
            echo "::warning::CONCLAVE_TOKEN unset — skipping review-finished emit"
            exit 0
          fi
          PAYLOAD=$(jq -n \
            --arg repo "$REPO" \
            --argjson pr "${PR_NUMBER:-0}" \
            --argjson cycles "${CYCLE:-0}" \
            --arg status "bailed-cycle-ceiling" \
            --arg reason "Autonomy loop hit cycle ceiling (${CYCLE}/${MAX_CYCLES}) — human review needed" \
            '{
              repo_slug: $repo,
              episodic_id: env.EPISODIC,
              stage: "review-finished",
              payload: {
                repo: $repo,
                pullNumber: $pr,
                bailStatus: $status,
                cyclesRun: $cycles,
                totalBlockersFound: 0,
                blockersAutofixed: 0,
                blockersOutstanding: 0,
                totalCostUsd: 0,
                deployOutcome: "unknown",
                recommendation: "hold",
                reason: $reason
              }
            }')
          curl -fsS -X POST \
            -H "Authorization: Bearer ${CONCLAVE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${BASE}/review/notify-progress" | head -c 200 || \
            echo "::warning::review-finished emit failed (non-fatal)"
