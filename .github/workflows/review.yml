# Conclave AI — reusable review workflow (v0.4)
#
# Called by downstream repos' wrapper workflows (.github/workflows/conclave.yml,
# generated by `conclave init`). Do not trigger this directly on conclave-ai/
# conclave-ai itself — it would try to review itself recursively.
#
# Usage from a consumer repo:
#
#   name: Conclave AI
#   on: { pull_request: { types: [opened, synchronize, reopened] } }
#   jobs:
#     conclave:
#       uses: conclave-ai/conclave-ai/.github/workflows/review.yml@v0.4
#       secrets: inherit
#
# Trust model (v0.5.2):
#   This workflow runs on `pull_request`, which checks out the PR branch code.
#   To avoid leaking LLM / Telegram / GitHub secrets into attacker-controlled
#   PR code, the secret-bearing `conclave review` step is gated by an author
#   guard: it only runs for non-fork PRs authored by the repo owner (or the
#   repo owner's bot accounts). Fork PRs and external-contributor PRs get a
#   friendly fallback comment pointing to local install instructions — no
#   secrets are exposed.
#
#   If you want external contributors' PRs auto-reviewed, run `conclave review`
#   from a trusted context (e.g. a `workflow_run` or manual dispatch after a
#   maintainer inspects the diff). That's out of scope for this reusable
#   workflow; keep it fail-safe.
#
# Secrets the caller MUST provide (or inherit):
#   ANTHROPIC_API_KEY       required
#   OPENAI_API_KEY          optional (enables 3-agent tier-1; otherwise 1-agent)
#   GEMINI_API_KEY          optional (same)
#   CONCLAVE_TOKEN          required for Telegram notifications — installed
#                           by `conclave init`. Routes notifications through
#                           the central @Conclave_ai_bot, so you never need
#                           your own bot token. If absent, review still runs
#                           but posts no Telegram notification.
#   ORCHESTRATOR_PAT        optional — REQUIRED for the rework button loop
#                           (persist-episodic-to-main step + rework push-back).
#                           Without it, review runs but rework cannot resolve
#                           the episodic id later.
#
# Optional repo variables (GitHub Actions `vars`, not secrets):
#   CONCLAVE_CENTRAL_URL    override the central plane base URL. Leave unset
#                           for the production default. Useful for staging
#                           or self-hosted deployments.
#
# v0.4.4 — Telegram now routes through the central plane by default.
# The legacy TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID secrets are no longer
# consulted by this workflow. Drop them with:
#     gh secret delete TELEGRAM_BOT_TOKEN --repo <slug>
#     gh secret delete TELEGRAM_CHAT_ID   --repo <slug>
# Self-hosted users who still want the direct-bot path can invoke the CLI
# outside this reusable workflow.
#
# v0.5.2 — security hardening:
#   1. Secret-bearing step guarded to non-fork, owner-authored PRs.
#   2. CLI install pinned to an explicit semver default (not "latest").
#   3. Review output redacted before being posted as a public PR comment.

name: Conclave AI Review (reusable)

on:
  workflow_call:
    inputs:
      domain:
        description: 'Review domain — LEGACY, alias of force-domain. Leave empty for auto-detect (v0.5.3+).'
        required: false
        type: string
        default: ""
      force-domain:
        description: 'Force a specific domain (code|design), bypassing v0.5.3 auto-detect. Leave empty (default) to let the CLI inspect the diff.'
        required: false
        type: string
        default: ""
      cli-version:
        # Pinned default — update this default when you bump the CLI;
        # intentional bumps only. Using "latest" is a supply-chain risk
        # because a compromised or mis-tagged publish would be picked up
        # by every consumer on the next run.
        #
        # v0.7.4 bump: 0.6.2 default pointed at a version that was never
        # published to npm (0.6.2 was skipped — jumped 0.5.4 → 0.6.4).
        # All consumer repos relying on the default failed with
        # ERR_PNPM_NO_MATCHING_VERSION. 0.7.4 is the current latest
        # stable and carries all fixes: central-plane dual-path notifier,
        # this-binding fix on /review/notify, binary-file autofix
        # handler, persistent credentials via `conclave config`, and the
        # v0.7.1 `--json` / auto-spawn review pipeline.
        # v0.9.0 bump: multi-modal visual review (Playwright + DesignAgent
        # Mode A) wired into `conclave review --visual`.
        # v0.10.0 bump: autonomous rework loop closure — the rework
        # dispatcher (.github/workflows/rework.yml + the consumer-side
        # conclave-rework.yml from `conclave init`) now actually runs
        # `conclave autofix` on dispatch, embeds the cycle marker in
        # the autofix commit, and re-triggers review on the resulting
        # push. Loop is closed end-to-end with no external orchestrator.
        description: 'npm version tag for @conclave-ai/cli. Pinned default; override to a specific semver for reproducible reviews.'
        required: false
        type: string
        default: 0.14.9
      force-max-cycles:
        description: 'v0.8 — override the configured autonomy.maxReworkCycles for this run (clamped to 5). Empty string uses config.'
        required: false
        type: string
        default: ""
      visual:
        description: 'v0.9.0 — enable multi-modal visual review. Ignored for code-only PRs. When true, installs Playwright chromium on the runner.'
        required: false
        type: boolean
        default: false

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    concurrency:
      group: conclave-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true
    # v0.9.0: bumped from 15→20min. Multi-modal runs add up to 8min of
    # Playwright capture (capped by CLI-side totalBudgetMs). Keep the
    # headroom even when visual is off — auto-detect may flip a PR into
    # mixed domain and the author didn't expect it.
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # v0.13.4 — skip review when:
      #   1. PR head commit message contains [skip conclave] / [skip ci]
      #   2. The just-pushed commit changed zero files (empty commit /
      #      --allow-empty re-trigger — exactly the pattern that drove
      #      a $75 credit burn during the eventbadge#25 dogfood).
      # The existing "< 3 line" skip below catches small PRs by
      # CUMULATIVE diff against base; that doesn't help when a re-
      # trigger is pushed on top of a non-trivial PR. This guard runs
      # FIRST and shortcuts the whole review when the push itself was a
      # no-op.
      - name: Skip-conclave guard
        id: skip-guard
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          # Get the actual PR head commit message (NOT the merge-commit
          # that pull_request workflows check out).
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          MSG=$(git log -1 --format=%B "$HEAD_SHA" 2>/dev/null || echo "")
          if echo "$MSG" | grep -qE '\[skip conclave\]|\[skip ci\]|\[ci skip\]|\[no review\]'; then
            echo "::warning::Skip marker found in commit message — skipping review"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "SKIP_REVIEW=true" >> "$GITHUB_ENV"
            exit 0
          fi
          # `git diff-tree --no-commit-id --name-only -r HEAD` lists the
          # files changed BY THE LATEST COMMIT (vs its parent). Empty
          # output = empty commit = re-trigger with no real content.
          # Falls back to "do not skip" on any failure (initial commits,
          # detached states) — better to over-review than to silently drop.
          CHANGED=$(git diff-tree --no-commit-id --name-only -r "$HEAD_SHA" 2>/dev/null || true)
          if [ -z "$CHANGED" ]; then
            echo "::warning::HEAD commit changed zero files (empty re-trigger) — skipping review"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "SKIP_REVIEW=true" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        if: steps.skip-guard.outputs.skip != 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        if: steps.skip-guard.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install @conclave-ai/cli
        if: steps.skip-guard.outputs.skip != 'true'
        run: pnpm add -g "@conclave-ai/cli@${{ inputs.cli-version }}"

      # v0.9.0: install Playwright browsers only when visual review is
      # enabled. Skipped on code-only PRs to keep the ~90% of reviews
      # that don't need visual fast. DesignAgent still runs text-UI
      # (Mode B) without Playwright — the binaries are only needed for
      # Mode A (vision with screenshots).
      - name: Auto-detect domain (for Playwright gate)
        id: auto-detect-domain
        if: inputs.visual == true
        run: |
          git fetch origin ${{ github.base_ref }}:${{ github.base_ref }} --depth=50 2>/dev/null || true
          # UI-signal heuristic mirrors packages/cli/src/lib/domain-detect.ts
          # DEFAULT_UI_SIGNALS. We only install Playwright if at least one
          # match is found in the diff; otherwise domain is pure code.
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | \
            grep -E '\.(tsx|jsx|vue|svelte|astro|css|scss|sass|less|styl|pcss|html?|svg|png|webp|avif)$' \
            > /dev/null 2>&1; then
            echo "ui_present=true" >> $GITHUB_OUTPUT
          else
            echo "ui_present=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Playwright (chromium only)
        if: inputs.visual == true && steps.auto-detect-domain.outputs.ui_present == 'true'
        run: |
          pnpm add -g playwright
          npx playwright install chromium --with-deps

      - name: Fetch base + compute diff size
        run: |
          git fetch origin ${{ github.base_ref }}:${{ github.base_ref }} --depth=50 2>/dev/null || true
          DIFF_LINES=$(git diff origin/${{ github.base_ref }}...HEAD -- . ':!package-lock.json' ':!pnpm-lock.yaml' ':!*.lock' | wc -l)
          echo "diff_lines=$DIFF_LINES" >> $GITHUB_ENV
          if [ "$DIFF_LINES" -lt 3 ]; then
            echo "SKIP_REVIEW=true" >> $GITHUB_ENV
          fi

      # v0.8 — extract auto-rework cycle from HEAD commit message. Rework
      # commits pushed by the Worker embed `[conclave-rework-cycle:N]` in
      # their message; regular human commits do not. Absent marker → 0.
      # The cycle is propagated to `conclave review --rework-cycle` below.
      - name: Extract conclave-rework cycle from commit marker
        run: |
          set -euo pipefail
          # v0.13.4 — read the PR's HEAD commit, NOT the workflow's
          # checkout HEAD. On `pull_request` events, GitHub Actions
          # checks out `refs/pull/N/merge` (a synthetic merge commit
          # with auto-generated message like "Merge X into Y") — the
          # cycle marker autofix embeds in its real commit gets
          # invisible behind that merge commit. Live-caught on
          # eventbadge#25 review run 24957470277 where autofix's
          # commit had [conclave-rework-cycle:2] but the extractor
          # read the merge commit and pulled cycle=0.
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          if [ -n "${HEAD_SHA}" ]; then
            MSG=$(git log -1 --format=%B "$HEAD_SHA" 2>/dev/null || git log -1 --pretty=%B HEAD)
          else
            MSG=$(git log -1 --pretty=%B HEAD)
          fi
          CYCLE=$(printf "%s" "$MSG" | grep -oE '\[conclave-rework-cycle:[0-9]+\]' | head -1 | grep -oE '[0-9]+' || true)
          if [ -z "${CYCLE:-}" ]; then CYCLE=0; fi
          # Hard-ceiling safety: clamp to 5 no matter what the commit said.
          if [ "$CYCLE" -gt 5 ]; then CYCLE=5; fi
          echo "CONCLAVE_CYCLE=$CYCLE" >> $GITHUB_ENV
          echo "conclave-rework cycle on this commit: $CYCLE"

      # Secret-bearing step. Only runs for non-fork PRs authored by the
      # repo owner — anyone else's PR code should NOT see these secrets.
      # Fork PRs and external-contributor PRs hit the fallback step below.
      - name: Run 2-tier council review
        if: env.SKIP_REVIEW != 'true' && github.event.pull_request.head.repo.fork == false && github.event.pull_request.user.login == github.repository_owner
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CONCLAVE_TOKEN: ${{ secrets.CONCLAVE_TOKEN }}
          CONCLAVE_CENTRAL_URL: ${{ vars.CONCLAVE_CENTRAL_URL || '' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # v0.5.3: auto-detect is the default. Pass --domain only when
          # the caller explicitly opted out via force-domain (or the
          # legacy `domain` input, kept for one release as a migration
          # shim — empty-string default is the new hands-off path).
          FORCE_DOMAIN: ${{ inputs.force-domain || inputs.domain }}
          FORCE_MAX_CYCLES: ${{ inputs.force-max-cycles }}
          VISUAL_FLAG: ${{ (inputs.visual == true && steps.auto-detect-domain.outputs.ui_present == 'true') && '--visual' || '' }}
        run: |
          EXTRA_ARGS=""
          if [ -n "${FORCE_MAX_CYCLES:-}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --max-rework-cycles $FORCE_MAX_CYCLES"
          fi
          if [ -n "$FORCE_DOMAIN" ]; then
            conclave review \
              --pr ${{ github.event.pull_request.number }} \
              --domain "$FORCE_DOMAIN" \
              --rework-cycle ${CONCLAVE_CYCLE:-0} \
              $EXTRA_ARGS \
              $VISUAL_FLAG \
              2>&1 | tee /tmp/conclave-result.txt || true
          else
            conclave review \
              --pr ${{ github.event.pull_request.number }} \
              --rework-cycle ${CONCLAVE_CYCLE:-0} \
              $EXTRA_ARGS \
              $VISUAL_FLAG \
              2>&1 | tee /tmp/conclave-result.txt || true
          fi

      # Redact any accidental secret leaks from the review stdout before it
      # becomes a public PR comment. Patterns cover the keys this workflow
      # handles plus common GitHub/Telegram tokens that might show up in
      # diffs or error traces.
      - name: Redact secrets from review output
        if: env.SKIP_REVIEW != 'true' && github.event.pull_request.head.repo.fork == false && github.event.pull_request.user.login == github.repository_owner
        run: |
          if [ -f /tmp/conclave-result.txt ]; then
            sed -E \
              -e 's/sk-ant-api03-[a-zA-Z0-9_-]{64,}/<redacted-anthropic>/g' \
              -e 's/sk-proj-[a-zA-Z0-9_-]{64,}/<redacted-openai>/g' \
              -e 's/sk-[a-zA-Z0-9_-]{40,}/<redacted-generic>/g' \
              -e 's/AIza[0-9A-Za-z_-]{35}/<redacted-google>/g' \
              -e 's|ghp_[a-zA-Z0-9]{36}|<redacted-github-pat>|g' \
              -e 's|gho_[a-zA-Z0-9]{36}|<redacted-github-oauth>|g' \
              -e 's|ghs_[a-zA-Z0-9]{36}|<redacted-github-server>|g' \
              -e 's/[0-9]{8,12}:[a-zA-Z0-9_-]{35}/<redacted-telegram>/g' \
              /tmp/conclave-result.txt > /tmp/conclave-redacted.txt
          fi

      - name: Post review summary as PR comment
        if: env.SKIP_REVIEW != 'true' && github.event.pull_request.head.repo.fork == false && github.event.pull_request.user.login == github.repository_owner
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f /tmp/conclave-redacted.txt ]; then
            {
              echo "## 🏛️ Conclave AI Review"
              echo ""
              echo '```'
              head -200 /tmp/conclave-redacted.txt
              echo '```'
              echo ""
              echo "_Generated by [@conclave-ai/cli](https://www.npmjs.com/package/@conclave-ai/cli) — 2-tier council._"
            } > /tmp/pr-body.md
            gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/pr-body.md || true
          fi

      # Fallback for fork PRs / external contributors: no secrets, no LLM
      # call, just a friendly comment explaining why auto-review was skipped
      # and how to run it locally. Uses the ambient GITHUB_TOKEN (scoped to
      # this workflow), which is safe because this step runs no PR-authored
      # code.
      - name: Post external-PR notice
        if: env.SKIP_REVIEW != 'true' && (github.event.pull_request.head.repo.fork == true || github.event.pull_request.user.login != github.repository_owner)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "## 🏛️ Conclave AI Review — skipped"
            echo ""
            echo "Conclave review is skipped for external PRs (fork or non-owner author) to protect repository secrets."
            echo ""
            echo "To run the review locally:"
            echo ""
            echo '```bash'
            echo "npm install -g @conclave-ai/cli"
            echo "conclave review --pr ${{ github.event.pull_request.number }}"
            echo '```'
            echo ""
            echo "A maintainer can also re-run the review after inspecting the diff."
          } > /tmp/pr-body.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/pr-body.md || true

      # v0.9.2 — persist-episodic-to-main step REMOVED.
      #
      # Rationale: every review fired a `conclave-bot[memory]` commit to
      # the consumer's default branch, which re-triggered any Vercel/
      # Netlify/CF-Pages production deploy watching that branch. With
      # Conclave running on every PR synchronize, this produced dozens
      # of instant-ERROR production deploys per day — quiet cost drain
      # for consumers and a user-visible "nothing ever deploys green"
      # signal on the repo's Vercel dashboard.
      #
      # The replacement is: pr_number is propagated in the
      # repository_dispatch client_payload (auto-dispatch side already
      # did this since v0.8; manual Telegram-button side is getting the
      # same treatment in the central plane). The rework/merge/reject
      # workflows prefer payload.pr_number over the legacy
      # grep-on-main fallback, so episodic memory no longer needs to
      # live on the default branch to route dispatches.
      #
      # Long-term (v0.10) — episodic storage moves to D1 entirely,
      # eliminating the fallback grep as well. Until then, the grep
      # path remains as a safety net but will find nothing on repos
      # that never had persist enabled (which is fine — payload path
      # handles it).

      # PIA-4 — close the silent-skip loop. Pre-PIA-4 a sub-3-line PR
      # (or — more commonly — an autofix cycle that perfectly resolved
      # the only blocker by deleting dead code, leaving cycle 2's diff
      # near-empty) hit this branch and ONLY logged to the runner.
      # The PR page showed no review, the PR author saw silence, and the
      # autonomy loop's terminal state was hidden. Now we post a brief
      # PR comment AND a workflow-summary annotation so the resolution
      # is visible from both surfaces.
      - name: Skip notice
        if: env.SKIP_REVIEW == 'true' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "Diff under 3 lines — skipping review. This is intentional and does not fail the job."
          # Workflow summary — visible to anyone with Actions read access.
          {
            echo "## 🏛️ Conclave AI Review — skipped (sub-3-line diff)"
            echo ""
            echo "PR's effective diff vs. base is under 3 lines, which usually means one of:"
            echo "- a previous autofix cycle resolved the only blocker by deleting code"
            echo "- the PR is a deliberately tiny patch (typo, version bump)"
            echo ""
            echo "No review fired. If you expected a review on this push, push a non-trivial change."
          } >> "$GITHUB_STEP_SUMMARY"
          # PR comment — visible to the PR author + reviewers.
          # Best-effort: gh pr comment can fail on archived/closed PRs;
          # do not fail the workflow if it does.
          {
            echo "## 🏛️ Conclave AI Review — skipped"
            echo ""
            echo "Diff under 3 lines vs. base — review skipped (intentional)."
            echo ""
            echo "Common causes:"
            echo "- a previous autofix cycle resolved the only blocker by deleting code"
            echo "- the PR is a deliberately tiny patch"
            echo ""
            echo "_If a previous autofix cycle on this PR closed all blockers, this is the **terminal success** of the autonomy loop._"
          } > /tmp/pr-skip-body.md
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/pr-skip-body.md || \
            echo "::warning::skip-notice PR comment failed (non-fatal)"
