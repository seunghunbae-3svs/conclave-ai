# Conclave AI — reusable review workflow (v0.4)
#
# Called by downstream repos' wrapper workflows (.github/workflows/conclave.yml,
# generated by `conclave init`). Do not trigger this directly on conclave-ai/
# conclave-ai itself — it would try to review itself recursively.
#
# Usage from a consumer repo:
#
#   name: Conclave AI
#   on: { pull_request: { types: [opened, synchronize, reopened] } }
#   jobs:
#     conclave:
#       uses: conclave-ai/conclave-ai/.github/workflows/review.yml@v0.4
#       secrets: inherit
#
# Secrets the caller MUST provide (or inherit):
#   ANTHROPIC_API_KEY       required
#   OPENAI_API_KEY          optional (enables 3-agent tier-1; otherwise 1-agent)
#   GEMINI_API_KEY          optional (same)
#   TELEGRAM_BOT_TOKEN      optional (disables Telegram notifier if missing)
#   TELEGRAM_CHAT_ID        optional (same)
#   ORCHESTRATOR_PAT        optional — REQUIRED for the rework button loop
#                           (persist-episodic-to-main step + rework push-back).
#                           Without it, review runs but rework cannot resolve
#                           the episodic id later.
#
# v0.4.0-beta will migrate this to call the central plane for memory sync
# and CONCLAVE_TOKEN-based auth; the consumer wrapper file will not change.

name: Conclave AI Review (reusable)

on:
  workflow_call:
    inputs:
      domain:
        description: 'Review domain — "code" (default) or "design" (escalates to tier 2 always).'
        required: false
        type: string
        default: code
      cli-version:
        description: 'npm version tag for @conclave-ai/cli. Default "latest"; pin to a specific version for reproducible reviews.'
        required: false
        type: string
        default: latest

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    concurrency:
      group: conclave-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install @conclave-ai/cli
        run: pnpm add -g "@conclave-ai/cli@${{ inputs.cli-version }}"

      - name: Fetch base + compute diff size
        run: |
          git fetch origin ${{ github.base_ref }}:${{ github.base_ref }} --depth=50 2>/dev/null || true
          DIFF_LINES=$(git diff origin/${{ github.base_ref }}...HEAD -- . ':!package-lock.json' ':!pnpm-lock.yaml' ':!*.lock' | wc -l)
          echo "diff_lines=$DIFF_LINES" >> $GITHUB_ENV
          if [ "$DIFF_LINES" -lt 3 ]; then
            echo "SKIP_REVIEW=true" >> $GITHUB_ENV
          fi

      - name: Run 2-tier council review
        if: env.SKIP_REVIEW != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          conclave review \
            --pr ${{ github.event.pull_request.number }} \
            --domain ${{ inputs.domain }} \
            2>&1 | tee /tmp/conclave-result.txt || true

      - name: Post review summary as PR comment
        if: env.SKIP_REVIEW != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f /tmp/conclave-result.txt ]; then
            {
              echo "## 🏛️ Conclave AI Review"
              echo ""
              echo '```'
              head -200 /tmp/conclave-result.txt
              echo '```'
              echo ""
              echo "_Generated by [@conclave-ai/cli](https://www.npmjs.com/package/@conclave-ai/cli) — 2-tier council._"
            } > /tmp/pr-body.md
            gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/pr-body.md || true
          fi

      # Persist-episodic: only runs if ORCHESTRATOR_PAT is provided. Required
      # for the rework-button loop (later rework/merge/reject workflows grep
      # .conclave/episodic on main to resolve episodic ids). Review alone
      # works without it.
      - name: Persist episodic entries to default branch
        if: env.SKIP_REVIEW != 'true'
        env:
          HAS_PAT: ${{ secrets.ORCHESTRATOR_PAT != '' && 'yes' || 'no' }}
          GH_TOKEN: ${{ secrets.ORCHESTRATOR_PAT }}
        run: |
          set -euo pipefail
          if [ "$HAS_PAT" != "yes" ]; then
            echo "ORCHESTRATOR_PAT not set — skipping episodic persist (rework button will not work, review-only install)."
            exit 0
          fi
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" /tmp/main-repo
          mkdir -p /tmp/main-repo/.conclave
          if [ -d .conclave/episodic ]; then
            mkdir -p /tmp/main-repo/.conclave/episodic
            cp -r .conclave/episodic/. /tmp/main-repo/.conclave/episodic/
          fi
          if [ -d .conclave/answer-keys ]; then
            mkdir -p /tmp/main-repo/.conclave/answer-keys
            cp -r .conclave/answer-keys/. /tmp/main-repo/.conclave/answer-keys/ || true
          fi
          if [ -d .conclave/failure-catalog ]; then
            mkdir -p /tmp/main-repo/.conclave/failure-catalog
            cp -r .conclave/failure-catalog/. /tmp/main-repo/.conclave/failure-catalog/ || true
          fi
          cd /tmp/main-repo
          git config user.name  "conclave-bot[memory]"
          git config user.email "memory@conclave.ai"
          git add .conclave/
          if git diff --cached --quiet; then
            echo "No memory changes to commit."
            exit 0
          fi
          git commit -m "chore(conclave): persist episodic for PR #${{ github.event.pull_request.number }} [skip ci]"
          git push origin HEAD:main

      - name: Skip notice
        if: env.SKIP_REVIEW == 'true'
        run: echo "Diff under 3 lines — skipping review. This is intentional and does not fail the job."
