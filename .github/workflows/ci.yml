name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-build:
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test

      # PIA-1 — release scripts live OUTSIDE the turbo-managed packages/
      # tree, so `pnpm test` skips them. Run them explicitly. Until
      # PIA-1 added bump-workflow-cli-version, the dead-CI gap meant
      # bump-changed-packages.test.mjs was authored but never green-
      # lit by any pipeline. The LIVE INVARIANT inside
      # bump-workflow-cli-version.test.mjs catches drift between
      # workflow cli-version pins and packages/cli/package.json on
      # every PR.
      - name: Run release-scripts tests
        run: node --test scripts/release/*.test.mjs
