name: release

# Two triggers:
#   1. workflow_dispatch — manual "ship a release" button in the Actions UI.
#      Bumps every public package in lockstep (monorepo pre-1.0 policy) and
#      publishes via `pnpm publish -r`.
#   2. tag push on `v*` — for when you want to cut the tag locally and let
#      CI handle the actual publish. Skips the version bump step since the
#      tag is the source of truth.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options: ["patch", "minor", "major"]
  push:
    tags: ["v*"]

concurrency:
  # `cancel-in-progress: false` is deliberate. A running release has
  # already started publishing npm tarballs; killing it mid-flight
  # leaves the registry in a split state (some packages on the new
  # version, some on the old). With `false`, the second trigger queues
  # until the first finishes — the GitHub Actions concurrency group
  # only keeps at most one pending run, so there is no race.
  group: release
  cancel-in-progress: false

permissions:
  contents: write     # push bump commit + create tag (workflow_dispatch path)
  id-token: write     # npm provenance
  # PIA-1 follow-on note — `workflows: write` is NOT a valid GitHub
  # Actions permission scope (rejected with HTTP 422 by the workflow
  # parser). GITHUB_TOKEN cannot modify .github/workflows/*.yml at all
  # by GitHub's design (prevents workflows from self-rewriting). The
  # checkout step below uses ORCHESTRATOR_PAT (which has the `workflow`
  # GitHub-PAT scope) so PIA-1's auto-bump push goes through. Falls
  # back to GITHUB_TOKEN when the PAT isn't set (which means the bump
  # push will fail and the release will need a re-run after manual
  # workflow update — the LIVE INVARIANT in the bump script's tests
  # would catch the drift on the next CI run).

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PIA-1 follow-on — must be a PAT with `workflow` scope so the
          # bump-changed-packages + bump-workflow-cli-version commit can
          # push files under .github/workflows/. GITHUB_TOKEN can never
          # modify workflow files by GitHub's design. Falls back to
          # GITHUB_TOKEN when the PAT isn't set (release commit still
          # lands; only the workflow-default bump push fails, surfaced
          # as a fail status the operator can address by hand).
          token: ${{ secrets.ORCHESTRATOR_PAT || secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test

      # workflow_dispatch must run on main — protects against accidentally
      # pushing a feature branch into main via the release pipeline.
      - name: Require main branch for manual runs
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main' }}
        run: |
          echo "::error::release workflow_dispatch must run on 'main', got ${{ github.ref }}"
          exit 1

      # Bump + commit + tag (workflow_dispatch path). No-op on tag-push path.
      - name: Bump versions + commit + tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # v0.13.12 — bump only packages whose files changed since the
          # last v* tag, plus the "driver" package (core) so the
          # vX.Y.Z tag advances every release. Replaces the old
          # `pnpm -r exec npm version $BUMP` lockstep step which
          # advanced every internal package's version on every release
          # even when the package code hadn't moved.
          # See scripts/release/bump-changed-packages.test.mjs for unit tests.
          node scripts/release/bump-changed-packages.mjs | tee /tmp/bump-summary.json
          # PIA-1 — keep .github/workflows/{review,rework,merge}.yml's
          # `cli-version: default: X.Y.Z` pin in lockstep with the just-
          # bumped packages/cli/package.json .version. Pre-PIA-1 this was
          # a hand-bumped "chore(workflows): ..." commit; forgetting it
          # left consumer-side wrappers (`uses: ...@v0.4`) installing the
          # OLD CLI on every PR even after v0.4 floating tag moved
          # (caught LIVE on cli@0.14.0 release / eventbadge PR #38).
          # Idempotent; CI invariant test catches drift outside release
          # runs (see scripts/release/bump-workflow-cli-version.test.mjs).
          node scripts/release/bump-workflow-cli-version.mjs | tee /tmp/workflow-bump.json
          ROOT_VERSION=$(node -p "require('./packages/core/package.json').version")
          # Idempotent: only commit when there are actual changes (covers
          # pnpm no-op re-runs and manual-bump recoveries).
          if git diff --cached --quiet && git diff --quiet; then
            echo "No version changes staged. Nothing to commit."
          else
            git add -A
            git commit -m "chore(release): v$ROOT_VERSION"
            git push origin HEAD:main
          fi
          # Remote-aware idempotent tag.
          #
          # `^{}` peels annotated tags to the commit they point at — without
          # it, `git ls-remote` returns the tag OBJECT hash for annotated
          # tags, which never equals any commit SHA and would cause a
          # spurious mismatch on re-runs of a signed/annotated release.
          #
          # Push-path is wrapped so a race (another runner pushed the same
          # tag between our check and push) retries the remote lookup and
          # accepts the run when the remote tag resolves to our HEAD.
          # Concurrency group already serializes release runs for this
          # workflow, so this is defense-in-depth against anything else
          # that might push the same vX.Y.Z tag.
          CURRENT_HEAD=$(git rev-parse --verify HEAD)
          lookup_remote_tag() {
            git ls-remote --tags origin "refs/tags/v$ROOT_VERSION^{}" \
              | awk '{print $1}'
          }
          REMOTE_TAG_HASH=$(lookup_remote_tag || true)
          if [ -n "$REMOTE_TAG_HASH" ]; then
            if [ "$REMOTE_TAG_HASH" = "$CURRENT_HEAD" ]; then
              echo "Tag v$ROOT_VERSION already on remote at HEAD; skipping create + push."
            else
              echo "::error::Remote tag v$ROOT_VERSION points at $REMOTE_TAG_HASH, not HEAD ($CURRENT_HEAD). Refusing to overwrite — bump the version if this was an accidental re-run."
              exit 1
            fi
          else
            git tag "v$ROOT_VERSION"
            if ! git push origin "v$ROOT_VERSION" 2>push.err; then
              RACE_TAG_HASH=$(lookup_remote_tag || true)
              if [ "$RACE_TAG_HASH" = "$CURRENT_HEAD" ]; then
                echo "Push raced with another runner, but remote tag now resolves to HEAD — accepting."
              else
                cat push.err >&2
                exit 1
              fi
            fi
          fi

      # npm provenance requires a PUBLIC source repo — sigstore bundle
      # verification rejects privates with "Unsupported GitHub Actions
      # source repository visibility: private". We leave the feature off
      # by default and enable it via `PROVENANCE=true` env input once the
      # repo is flipped to public.
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: ${{ vars.NPM_CONFIG_PROVENANCE || 'false' }}
        run: pnpm publish -r --access public --no-git-checks

      # v0.13.9 — auto-move the current floating tag (e.g. v0.4) onto
      # the just-published release commit. Pre-fix this was manual:
      # after every patch release we'd `git tag -f v0.4 <sha> && git
      # push --force origin v0.4`, and forgetting it left consumer
      # `uses: ...@v0.4` workflows pinned to the previous CLI version.
      #
      # Source of truth: `.release-floating-tag` at the repo root (one
      # line, e.g. `v0.4`). When the file is missing, the step is a
      # no-op — keeps single-version repos and unrelated forks from
      # accidentally moving a tag they don't have.
      #
      # Concurrency-safe: the surrounding workflow's `concurrency:
      # release` group already serializes release runs, so two
      # publishes can't race here.
      - name: Move floating tag (post-publish)
        run: |
          set -euo pipefail
          if [ ! -f .release-floating-tag ]; then
            echo "No .release-floating-tag file at repo root; skipping floating-tag move."
            exit 0
          fi
          FLOAT_TAG=$(tr -d '[:space:]' < .release-floating-tag)
          if [ -z "$FLOAT_TAG" ]; then
            echo "::warning::.release-floating-tag is empty; skipping."
            exit 0
          fi
          # Refuse to move a non-floating semver tag like v0.13.9 — those
          # are immutable per release. Floating tags look like vMAJOR or
          # vMAJOR.MINOR (no patch component).
          if ! echo "$FLOAT_TAG" | grep -qE '^v[0-9]+(\.[0-9]+)?$'; then
            echo "::error::.release-floating-tag value '$FLOAT_TAG' is not a floating tag (expected vMAJOR or vMAJOR.MINOR — never vMAJOR.MINOR.PATCH)."
            exit 1
          fi
          CURRENT_HEAD=$(git rev-parse --verify HEAD)
          echo "Moving $FLOAT_TAG → $CURRENT_HEAD"
          git tag -f "$FLOAT_TAG" "$CURRENT_HEAD"
          git push --force origin "$FLOAT_TAG"
